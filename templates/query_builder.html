<!DOCTYPE html>
<html>
<head>
    <title>F1 Query Builder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="container mt-4">

    <h1>⚙️ F1 Data Explorer</h1>

    <!-- =========================
         CONTROLS
    ========================== -->
    <form method="GET" class="row g-3 mb-4">

        <!-- METRIC -->
        <div class="col-md-3">
            <label>Metric</label>
            <select name="metric" class="form-select">
                <option value="wins" {% if metric == "wins" %}selected{% endif %}>Wins</option>
                <option value="avg_finish" {% if metric == "avg_finish" %}selected{% endif %}>Avg Finish</option>
                <option value="races" {% if metric == "races" %}selected{% endif %}>Races</option>
            </select>
        </div>

        <!-- GROUP BY -->
        <div class="col-md-3">
            <label>Group By</label>
            <select name="group_by" class="form-select">
                <option value="driver" {% if group_by == "driver" %}selected{% endif %}>Driver</option>
                <option value="constructor" {% if group_by == "constructor" %}selected{% endif %}>Constructor</option>
                <option value="circuit" {% if group_by == "circuit" %}selected{% endif %}>Circuit</option>
            </select>
        </div>

        <!-- YEAR -->
        <div class="col-md-3">
            <label>Year (optional)</label>
            <input type="number" name="year" class="form-control" value="{{ year or '' }}">
        </div>

        <!-- BUTTON -->
        <div class="col-md-3 d-flex align-items-end">
            <button class="btn btn-primary w-100">Run Query</button>
        </div>

    </form>

    <!-- =========================
         TABLE
    ========================== -->
    <table class="table table-bordered">
        <tr>
            <th>Name</th>
            <th>Value</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row.name }}</td>
            <td>{{ row.value }}</td>
        </tr>
        {% endfor %}
    </table>

    <!-- =========================
         CHART
    ========================== -->
    <canvas id="chart"></canvas>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const labels = JSON.parse('{{ labels | default([]) | tojson | safe }}');
            const values = JSON.parse('{{ values | default([]) | tojson | safe }}');

            new Chart(document.getElementById("chart"), {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Result",
                        data: values
                    }]
                }
            });

        });
    </script>

    <div class="mt-4">
        <a href="/" class="btn btn-dark">← Back</a>
    </div>

</body>
</html>
